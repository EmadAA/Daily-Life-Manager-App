name: life_manager_pro
description: A comprehensive life management application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core Packages
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  
  # UI Components
  google_fonts: ^6.1.0
  flutter_slidable: ^3.0.0
  shimmer: ^3.0.0
  
  # Utilities
  intl: ^0.18.0
  shared_preferences: ^2.0.0
  path_provider: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  isar_generator: ^3.1.0
  build_runner: ^2.4.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true